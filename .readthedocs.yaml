version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  jobs:
    pre_install:
      - pip install --upgrade uv
    install:
      - uv sync --extra docs --extra dev
    build:
      html:
        - uv run sphinx-build -b html -W --keep-going docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

formats:
  - htmlzip
